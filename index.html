<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Digital Bulletin Board</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>

<body>

<div class="topbar">
  <div>Student Organization - Digital Bulletin Board</div>
  <div>
    <button class="active" onclick="switchPage('feed', this)">Feed</button>
    <button onclick="switchPage('submit', this)">Submit</button>
    <button onclick="switchPage('admin', this)">Admin</button>
  </div>
</div>

<!-- FEED -->
<div id="feed" class="page active">
  <div class="container">
    <h1>Announcements</h1>

    <div class="flex filter-search">
      <select onchange="setFilter(this.value)">
        <option value="all">All Organizations</option>
        <option value="Central Student Government">Central Student Government</option>
        <option value="Computer Science Clique">Computer Science Clique</option>
      </select>

      <input class="search" placeholder="Search..." oninput="renderFeed(this.value)">
    </div>

    <div id="feed-list"></div>
  </div>
</div>

<!-- SUBMIT -->
<div id="submit" class="page">
  <div class="container">
    <h1>Submit Announcement</h1>

    <select id="org">
      <option value="">Select organization</option>
      <option value="Central Student Government">Central Student Government</option>
      <option value="Computer Science Clique">Computer Science Clique</option>
    </select>

    <input id="title" placeholder="Title">
    <textarea id="body" placeholder="Content"></textarea>
    <input id="fb" placeholder="Facebook link (optional)">
    <input id="submittedBy" placeholder="Submitted by">

    <label class="switch">
      <input type="checkbox" id="urgent">
      <span class="slider"></span>Mark as Urgent
    </label>
	
	<br>

    <label class="switch">
      <input type="checkbox" id="pinned">
      <span class="slider"></span>Mark as Pinned
    </label>
	
	<br>

    <button class="submit-btn" onclick="submitPost()">Submit Announcement</button>

    <h3>Preview</h3>
    <div id="preview-container"></div>
  </div>
</div>

<!-- ADMIN -->
<div id="admin" class="page">
  <div class="container">
    <h1>Admin Panel</h1>

    <div class="stats flex">
      <div class="stat-card">Total: <span id="total-count">0</span></div>
      <div class="stat-card">Pending: <span id="pending-count">0</span></div>
      <div class="stat-card">Approved: <span id="approved-count">0</span></div>
    </div>

    <h3>Pending</h3>
    <div id="admin-pending"></div>

    <h3>Approved</h3>
    <div id="admin-approved"></div>
  </div>
</div>

<!-- POPUP -->
<div id="popup" class="popup">
  <div class="popup-box">
    <button class="close-btn" onclick="closePopup()">×</button>
    <div class="popup-content">
      <p id="popup-text"></p>
    </div>
  </div>
</div>

</body>
